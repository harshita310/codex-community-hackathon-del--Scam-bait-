services:
  # ==========================================
  # 1. BACKEND API (FastAPI)
  # ==========================================
  - type: web
    name: honey-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-5.4
      - key: OPENAI_DETECTION_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_EXTRACTION_MODEL
        value: gpt-5.4
      - key: WHISPER_MODEL
        value: gpt-4o-transcribe
      - key: TTS_MODEL
        value: gpt-4o-mini-tts
      - key: TTS_VOICE
        value: nova
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_VISION_MODEL
        value: gpt-5.4
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: _CALLBACK_URL
        sync: false

  # ==========================================
  # 2. TELEGRAM BOT (Webhook Web Service)
  # ==========================================
  - type: web
    name: honey-bot
    env: python
    region: singapore
    plan: free
    healthCheckPath: /health
    # Install both main and bot requirements
    buildCommand: pip install -r requirements.txt && pip install -r bot/requirements.txt
    startCommand: python run_bot.py
    envVars:
      - key: DATABASE_URL
        fromService:
          type: web
          name: honey-api
          envVarKey: DATABASE_URL
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: HONEYPOT_API_URL
        sync: false
      - key: API_KEY
        sync: false
      - key: HONEYPOT_API_KEY
        sync: false
      - key: PRODUCTION_BOT_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "true"

  # ==========================================
  # 3. FRONTEND DASHBOARD (Web Service)
  # ==========================================
  - type: web
    name: honey-dashboard
    env: node
    region: singapore
    plan: free
    # Build the React app and install serve to host it
    buildCommand: cd dashboard && npm install && npm run build && npm install -g serve
    # Serve the built files on the assigned PORT
    startCommand: serve -s dashboard/dist -l $PORT
    envVars:
      - key: VITE_API_URL
        sync: false

# CONFIG: Optimized for Render deployment
